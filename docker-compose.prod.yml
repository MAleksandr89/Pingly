services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - internal
        restart: always
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 5s
            retries: 5
            start_period: 10s
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - internal
        restart: always
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    api:
        build: ./src/backend
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - proxy_network
            - internal
        restart: always
        healthcheck:
            test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - 'traefik.enable=true'
            - 'traefik.docker.network=proxy_network'
            - 'traefik.http.routers.pingly-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)'
            - 'traefik.http.routers.pingly-api.tls.certresolver=letsencrypt'
            - 'traefik.http.services.pingly-api.loadbalancer.server.port=8000'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    celery-worker:
        build: ./src/backend
        command: celery -A tasks.celery_app worker --loglevel=info --concurrency 2
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - internal
        restart: always
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    celery-beat:
        build: ./src/backend
        command: celery -A tasks.celery_app beat --loglevel=info
        env_file: .env
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - internal
        restart: always
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    frontend:
        build: ./src/frontend
        depends_on:
            api:
                condition: service_healthy
        networks:
            - proxy_network
            - internal
        restart: always
        healthcheck:
            test: ['CMD-SHELL', 'wget -q --spider http://localhost:80 || exit 1']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 5s
        labels:
            - 'traefik.enable=true'
            - 'traefik.docker.network=proxy_network'
            - 'traefik.http.routers.pingly-app.rule=Host(`${DOMAIN}`)'
            - 'traefik.http.routers.pingly-app.tls.certresolver=letsencrypt'
            - 'traefik.http.services.pingly-app.loadbalancer.server.port=80'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

networks:
    proxy_network:
        external: true
    internal:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
