services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - internal
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
            interval: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        networks:
            - internal
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5

    api:
        build: ./src/backend
        command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
        ports:
            - '8000:8000'
        env_file: .env
        volumes:
            - ./src/backend:/opt/backend
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - internal

    celery-worker:
        build: ./src/backend
        command: celery -A tasks.celery_app worker --loglevel=info
        env_file: .env
        volumes:
            - ./src/backend:/opt/backend
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - internal

    celery-beat:
        build: ./src/backend
        command: celery -A tasks.celery_app beat --loglevel=info
        env_file: .env
        volumes:
            - ./src/backend:/opt/backend
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - internal

    frontend:
        image: node:20-alpine
        working_dir: /opt/frontend
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
        ports:
            - '5173:5173'
        env_file: .env
        volumes:
            - ./src/frontend:/opt/frontend
            - frontend_node_modules:/opt/frontend/node_modules
        networks:
            - internal

networks:
    internal:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
    frontend_node_modules:
